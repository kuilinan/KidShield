name: Build APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      - name: Replace AAPT2 with stable version
        run: |
          BUILD_TOOLS=$ANDROID_HOME/build-tools/35.0.0
          echo "Before:"
          $BUILD_TOOLS/aapt2 version 2>&1 || true
          curl -sLo /tmp/aapt2.jar "https://dl.google.com/dl/android/maven2/com/android/tools/build/aapt2/8.3.0-10154469/aapt2-8.3.0-10154469-linux.jar"
          cd /tmp && unzip -o aapt2.jar aapt2 -d aapt2_extract 2>/dev/null
          sudo cp /tmp/aapt2_extract/aapt2 $BUILD_TOOLS/aapt2
          sudo chmod +x $BUILD_TOOLS/aapt2
          echo "After:"
          $BUILD_TOOLS/aapt2 version
      - name: Build APK
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug --no-daemon
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: kidshield-apk
          path: app/build/outputs/apk/debug/*.apk
